dag:
  dag_id: ml_pipeline
  owner: data-eng
  description: End-to-end ML pipeline - ingest → validate → profile → clean → feature_engineer → train → register → drift_report
  schedule_interval: "@weekly"
  catchup: false
  tags:
    - ml
    - production

tasks:
  retries: 1
  retry_delay_minutes: 5
  train_models_retries: 0

directories:
  landing: data/landing
  raw: data/raw
  interim: data/interim
  features: data/features
  reports: reports
  # Point to the active pipeline's config directory.
  # Swap to config/fraud, config/claims, etc. to run a different pipeline.
  config: config/healthcare

mlflow:
  tracking_uri: http://mlflow-server:5000
