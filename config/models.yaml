# Model Configuration

random_state: 42
train_test_split: 0.8

models:
  - name: "linear_baseline"
    type: "linear"
    hyperparameters:
      alpha: 1.0
      fit_intercept: true

  - name: "lightgbm_gbm"
    type: "gbm"
    hyperparameters:
      n_estimators: 100
      learning_rate: 0.05
      max_depth: 7
      num_leaves: 31
      min_child_samples: 20
      subsample: 0.8
      colsample_bytree: 0.8
      reg_alpha: 0.0
      reg_lambda: 1.0
      random_state: 42
      n_jobs: -1
