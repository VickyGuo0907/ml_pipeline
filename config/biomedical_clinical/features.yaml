# Healthcare pipeline feature engineering config
# Matches Demo_1: readmissions (PN filter) spine + HCAHPS pivot-join

# Multi-source assembly: filter spine to PN, pivot HCAHPS wide, join on Facility ID
join_strategy:
  enabled: true
  id_column: "Facility ID"
  spine:
    file_pattern: "FY_2024_Hospital_Readmissions_Reduction_Program"
    measure_column: "Measure Name"
    measure_value: "READM-30-PN-HRRP"
  pivots:
    - file_pattern: "HCAHPS"
      measure_column: "HCAHPS Question"
      measure_filter: "linear mean score"
      value_column: "HCAHPS Linear Mean Value"
      strip_suffix: " - linear mean score"

# Encoding applied after pivot-join
encoding:
  "State": "frequency"

# SVG Stage 2: Box-Cox transform on ExcessReadmissionRatio target
boxcox_target: true

# VIF disabled for this pipeline — HCAHPS survey questions are correlated by design
# and Demo_1 does not apply VIF pruning
vif_threshold: null

# Near-zero variance filter (removes features where >=95% of values are identical)
nzv_threshold: 0.95

# Drop modeling-specific columns not needed in the feature matrix.
# Metadata columns (Footnote, Start/End Date, Facility Name) are already
# removed at the clean stage; only join keys and leakage columns remain here.
drop_columns:
  - "Facility ID"
  - "Measure Name"
  - "Number of Readmissions"
  - "Predicted Readmission Rate"
  - "Expected Readmission Rate"

scale: true
