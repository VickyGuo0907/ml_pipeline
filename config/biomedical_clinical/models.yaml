# Stage 07 — model training config for biomedical_clinical pipeline
#
# Model ladder: progressively more complex to find the performance ceiling.
#   OLS (baseline) → Elastic Net → Ridge (multicollinearity) → LASSO (selection)
#   → Random Forest (non-linearity) → LightGBM (production-grade boosting)
#
# All models are trained per run and registered to MLflow Staging.
# Expected test R² ~0.04 with FY2024 HCAHPS + PN data (HCAHPS is a weak
# predictor of readmission ratio; low R² is scientifically expected here).

random_state: 42
train_test_split: 0.81

models:
  # Pure linear baseline — no regularization, establishes minimum R²
  - name: "ols_baseline"
    type: "ols"
    hyperparameters: {}

  # L1+L2 combined — alpha near zero collapses toward OLS on this dataset
  - name: "elastic_net"
    type: "elastic_net"
    hyperparameters:
      alpha: 0.01
      l1_ratio: 0.5
      max_iter: 2000

  # L2 regularization — handles HCAHPS multicollinearity better than OLS
  - name: "ridge_l2"
    type: "ridge"
    hyperparameters:
      alpha: 1.0
      fit_intercept: true

  # L1 regularization — drives low-signal HCAHPS features toward zero
  - name: "lasso_l1"
    type: "lasso"
    hyperparameters:
      alpha: 0.01
      max_iter: 2000

  # Non-linear baseline — tests whether tree splits reveal structure linear models miss
  - name: "random_forest"
    type: "random_forest"
    hyperparameters:
      n_estimators: 100
      max_features: 7
      random_state: 42
      n_jobs: -1

  # Gradient boosting — production-grade, typically best performer on tabular data
  - name: "lightgbm_gbm"
    type: "gbm"
    hyperparameters:
      n_estimators: 100
      learning_rate: 0.05
      max_depth: 7
      num_leaves: 31
      min_child_samples: 20
      subsample: 0.8
      colsample_bytree: 0.8
      reg_alpha: 0.0
      reg_lambda: 1.0
      random_state: 42
      n_jobs: -1
