# Stage 07 — model training config for biomedical_clinical pipeline
#
# Model ladder: progressively more complex to find the performance ceiling.
#   OLS (baseline) → Elastic Net → Ridge (multicollinearity) → LASSO (selection)
#   → Random Forest (non-linearity) → LightGBM (production-grade boosting)
#
# All models are trained per run and registered to MLflow Staging.
# Expected test R² ~0.04 with FY2024 HCAHPS + PN data (HCAHPS is a weak
# predictor of readmission ratio; low R² is scientifically expected here).

random_state: 42
train_test_split: 0.81

evaluation:
  min_test_r2: 0.0      # reject models worse than predicting the mean
  max_test_rmse: 0.10   # reject if RMSE > 0.10 (~2× the best observed 0.053)

models:
  # Pure linear baseline — no regularization, establishes minimum R²
  - name: "ols_baseline"
    type: "ols"
    hyperparameters: {}

  # L1+L2 combined — alpha near zero collapses toward OLS on this dataset
  - name: "elastic_net"
    type: "elastic_net"
    hyperparameters:
      alpha: 0.01
      l1_ratio: 0.5
      max_iter: 2000

  # L2 regularization — handles HCAHPS multicollinearity better than OLS
  - name: "ridge_l2"
    type: "ridge"
    hyperparameters:
      alpha: 1.0
      fit_intercept: true

  # L1 regularization — alpha reduced from 0.01 (zeroed too many features, test R²<0)
  # to 0.001 so feature selection is gentle enough on a 10-feature, weak-signal matrix
  - name: "lasso_l1"
    type: "lasso"
    hyperparameters:
      alpha: 0.001
      max_iter: 2000

  # Non-linear baseline — kept for educational comparison only.
  # With 10 features and weak signal this overfits severely (train R²=0.84, test R²=0.006).
  # The contrast with LightGBM shows why regularized boosting beats unconstrained trees here.
  - name: "random_forest"
    type: "random_forest"
    hyperparameters:
      n_estimators: 100
      max_features: 7
      random_state: 42
      n_jobs: -1

  # Gradient boosting — production-grade, typically best performer on tabular data
  - name: "lightgbm_gbm"
    type: "gbm"
    hyperparameters:
      n_estimators: 100
      learning_rate: 0.05
      max_depth: 7
      num_leaves: 31
      min_child_samples: 20
      subsample: 0.8
      colsample_bytree: 0.8
      reg_alpha: 0.0
      reg_lambda: 1.0
      random_state: 42
      n_jobs: -1
