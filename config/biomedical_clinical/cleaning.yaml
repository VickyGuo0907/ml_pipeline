# Healthcare pipeline cleaning config
# SVG Stage 1: Data Cleaning & Preparation

# HCAHPS is 447K rows — iterative (MICE) would time out. Median is fast and
# sufficient here; the HCAHPS pivot in Stage 5 uses only non-NaN linear-mean rows.
# Options: median | iterative | knn
impute_strategy: "median"

# Drop columns matched by case-insensitive substring against column names.
# Two categories:
#   - Metadata never useful for any analysis: identifiers, footnotes, date ranges
drop_column_patterns:
  - "Footnote"
  - "Start Date"
  - "End Date"
  - "Facility Name"

# HCAHPS Linear Mean Value is ~89% NaN (only populated for "linear mean score"
# rows). Protect it from the >50% missing drop so Stage 5 can pivot on it.
protect_columns:
  - "HCAHPS Linear Mean Value"

# Columns to check for exact duplicates (null = check all)
duplicates_subset: null

steps:
  - name: "type_coercion"
    type: "coerce_types"
    columns: null
    params:
      force_numeric: false

  - name: "impute_missing"
    type: "impute"
    columns: null
    params:
      threshold: 0.5  # Drop columns with >50% missing before imputing

  - name: "remove_duplicates"
    type: "deduplicate"
    columns: null
    params:
      keep: "first"
