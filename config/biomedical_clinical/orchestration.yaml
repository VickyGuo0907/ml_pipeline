dag:
  dag_id: biomedical_clinical_pipeline
  owner: data-eng
  description: Biomedical clinical readmission prediction — CMS Hospital Compare
  schedule: "@weekly"
  catchup: false
  tags:
    - ml
    - biomedical
    - clinical

tasks:
  retries: 1
  retry_delay_minutes: 5
  train_models_retries: 0
  enabled:
    profile: true            # ydata-profiling HTML per source file
    unsupervised_explore: true   # PCA + k-means hospital segmentation
    drift_report: true       # Evidently drift vs previous training set

directories:
  landing: data/biomedical_clinical/landing
  raw: data/biomedical_clinical/raw
  interim: data/biomedical_clinical/interim
  features: data/biomedical_clinical/features
  benchmark: data/biomedical_clinical/benchmark
  reports: reports/biomedical_clinical
  config: config/biomedical_clinical
  reports_base_url: "http://localhost:8888/biomedical_clinical"
