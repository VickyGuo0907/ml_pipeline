# Feature Engineering Configuration

# Column encoding strategies by column name or pattern
# Supports: one_hot, label, target, ordinal, binary
encoding:
  "Facility Name": "label"
  "State": "label"
  "Measure Name": "label"

# Sequential feature engineering steps
steps:
  - name: "encode_categorical"
    type: "encode"
    source_columns: ["Facility Name", "State", "Measure Name"]
    operation: "label_encode"
    params:
      handle_unknown: "use_encoded_value"
      unknown_value: -1

# Near-zero variance filtering threshold (0.95 = remove if 95% of values are same)
nzv_threshold: 0.95

# Columns to drop after encoding
drop_columns:
  - "Footnote"
  - "Start Date"
  - "End Date"

# Whether to apply standard scaling to numeric features
scale: true
