<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 950">
  <defs>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
      .title { font-size: 24px; font-weight: bold; fill: #1f2937; }
      .subtitle { font-size: 13px; fill: #6b7280; }
      .label { font-size: 11px; fill: #374151; }
      .component { font-size: 12px; font-weight: 600; fill: #1f2937; }
    </style>
    <marker id="arrow-primary" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-memory" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10b981"/>
    </marker>
    <marker id="arrow-tool" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/>
    </marker>
  </defs>
  <!-- Background -->
  <rect width="1200" height="950" fill="#ffffff"/>
  <!-- Title -->
  <text x="600" y="35" class="title" text-anchor="middle">Agent Architecture: Airflow Orchestrator</text>
  <text x="600" y="55" class="subtitle" text-anchor="middle">Orchestration Loop, Memory Layers, and Tool Execution</text>

  <!-- INPUT LAYER -->
  <text x="50" y="100" class="subtitle" font-weight="bold" fill="#1f2937">INPUT LAYER</text>
  <rect x="50" y="115" width="500" height="60" fill="#f0f9ff" stroke="#0284c7" stroke-width="2" rx="4"/>
  <circle cx="75" cy="145" r="14" fill="#0284c7"/>
  <text x="75" y="150" class="label" text-anchor="middle" fill="#ffffff" font-weight="bold">📅</text>
  <text x="105" y="135" class="component" fill="#0c4a6e">Trigger Event</text>
  <text x="105" y="153" class="label" fill="#0c4a6e">DAG schedule or manual trigger</text>
  <line x1="220" y1="145" x2="300" y2="145" stroke="#0284c7" stroke-width="2" marker-end="url(#arrow-primary)"/>
  <circle cx="350" cy="145" r="14" fill="#0284c7"/>
  <text x="350" y="150" class="label" text-anchor="middle" fill="#ffffff" font-weight="bold">📊</text>
  <text x="380" y="135" class="component" fill="#0c4a6e">Context</text>
  <text x="380" y="153" class="label" fill="#0c4a6e">run_id, config, data paths</text>

  <!-- AGENT CORE -->
  <text x="50" y="225" class="subtitle" font-weight="bold" fill="#1f2937">AGENT CORE (Airflow Scheduler)</text>
  <rect x="50" y="240" width="900" height="280" fill="none" stroke="#dbeafe" stroke-width="2" stroke-dasharray="5,5" rx="4"/>

  <!-- Planner/DAG Executor -->
  <rect x="70" y="260" width="200" height="80" fill="#dbeafe" stroke="#3b82f6" stroke-width="2" rx="4"/>
  <circle cx="95" cy="285" r="16" fill="#3b82f6"/>
  <text x="95" y="291" class="label" text-anchor="middle" fill="#ffffff" font-weight="bold">🧠</text>
  <text x="135" y="285" class="component" fill="#1e40af">Planner / Scheduler</text>
  <text x="135" y="302" class="label" fill="#3b82f6">Decides task order</text>
  <text x="135" y="318" class="label" fill="#3b82f6">Manages dependencies</text>

  <!-- DAG Graph -->
  <rect x="290" y="260" width="200" height="80" fill="#dbeafe" stroke="#3b82f6" stroke-width="2" rx="4"/>
  <circle cx="315" cy="285" r="16" fill="#3b82f6"/>
  <text x="315" y="291" class="label" text-anchor="middle" fill="#ffffff" font-weight="bold">🔗</text>
  <text x="355" y="285" class="component" fill="#1e40af">DAG Graph</text>
  <text x="355" y="302" class="label" fill="#3b82f6">9 stages in sequence</text>
  <text x="355" y="318" class="label" fill="#3b82f6">Task dependencies</text>

  <!-- Execution Engine -->
  <rect x="510" y="260" width="200" height="80" fill="#dbeafe" stroke="#3b82f6" stroke-width="2" rx="4"/>
  <circle cx="535" cy="285" r="16" fill="#3b82f6"/>
  <text x="535" y="291" class="label" text-anchor="middle" fill="#ffffff" font-weight="bold">⚡</text>
  <text x="575" y="285" class="component" fill="#1e40af">Executor</text>
  <text x="575" y="302" class="label" fill="#3b82f6">Runs tasks in sequence</text>
  <text x="575" y="318" class="label" fill="#3b82f6">Monitors status</text>

  <!-- Reasoning Loop -->
  <path d="M 70 350 Q 70 390 290 390 Q 510 390 510 350" fill="none" stroke="#7c3aed" stroke-width="2.5" marker-end="url(#arrow-tool)" stroke-dasharray="5,3"/>
  <text x="290" y="420" class="label" text-anchor="middle" fill="#7c3aed" font-weight="600">Iterative Execution Loop</text>
  <text x="290" y="437" class="label" text-anchor="middle" fill="#6b7280" font-size="10">Execute task → check status → decide next → repeat</text>

  <!-- MEMORY LAYERS -->
  <text x="800" y="225" class="subtitle" font-weight="bold" fill="#1f2937">MEMORY LAYERS</text>

  <!-- Working Memory (Context Window) -->
  <rect x="800" y="240" width="350" height="90" fill="#ecfdf5" stroke="#10b981" stroke-width="2" rx="4"/>
  <circle cx="825" cy="265" r="14" fill="#10b981"/>
  <text x="825" y="270" class="label" text-anchor="middle" fill="#ffffff" font-weight="bold">💭</text>
  <text x="865" y="265" class="component" fill="#059669">Working Memory</text>
  <text x="865" y="282" class="label" fill="#059669">Current task, run_id, context</text>
  <text x="865" y="298" class="label" fill="#059669">Shared via XCom between tasks</text>
  <text x="865" y="314" class="label" fill="#059669">Ephemeral (run lifetime)</text>

  <!-- Short-term Memory (Postgres) -->
  <rect x="800" y="340" width="350" height="100" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" rx="4"/>
  <circle cx="825" cy="370" r="14" fill="#f59e0b"/>
  <text x="825" y="375" class="label" text-anchor="middle" fill="#ffffff" font-weight="bold">🗄</text>
  <text x="865" y="365" class="component" fill="#b45309">Postgres (Metadata DB)</text>
  <text x="865" y="382" class="label" fill="#b45309">DAG runs, task logs</text>
  <text x="865" y="398" class="label" fill="#b45309">Execution history</text>
  <text x="865" y="414" class="label" fill="#b45309">Persistent (query for past runs)</text>

  <!-- Long-term Memory (File System) -->
  <rect x="800" y="450" width="350" height="100" fill="#ecfdf5" stroke="#10b981" stroke-width="2" rx="4"/>
  <circle cx="825" cy="480" r="14" fill="#10b981"/>
  <text x="825" y="485" class="label" text-anchor="middle" fill="#ffffff" font-weight="bold">💾</text>
  <text x="865" y="475" class="component" fill="#059669">File System (Manifests)</text>
  <text x="865" y="492" class="label" fill="#059669">manifest.yaml at each boundary</text>
  <text x="865" y="508" class="label" fill="#059669">Data lineage, checksums, audit trail</text>
  <text x="865" y="524" class="label" fill="#059669">Immutable record (versioning)</text>

  <!-- TOOL LAYER -->
  <text x="50" y="600" class="subtitle" font-weight="bold" fill="#1f2937">TOOL EXECUTION LAYER</text>
  <rect x="50" y="615" width="1100" height="280" fill="none" stroke="#fecaca" stroke-width="2" stroke-dasharray="5,5" rx="4"/>

  <!-- Tool 1: Ingest -->
  <rect x="70" y="635" width="150" height="90" fill="#fee2e2" stroke="#f87171" stroke-width="1.5" rx="3"/>
  <text x="145" y="655" class="component" text-anchor="middle" fill="#991b1b">① Ingest</text>
  <text x="145" y="672" class="label" text-anchor="middle" fill="#7f1d1d">Read CSVs</text>
  <text x="145" y="688" class="label" text-anchor="middle" fill="#7f1d1d">Hash files</text>
  <text x="145" y="704" class="label" text-anchor="middle" fill="#7f1d1d">Version data</text>

  <!-- Tool 2: Validate -->
  <rect x="235" y="635" width="150" height="90" fill="#fee2e2" stroke="#f87171" stroke-width="1.5" rx="3"/>
  <text x="310" y="655" class="component" text-anchor="middle" fill="#991b1b">② Validate</text>
  <text x="310" y="672" class="label" text-anchor="middle" fill="#7f1d1d">Pandera schema</text>
  <text x="310" y="688" class="label" text-anchor="middle" fill="#7f1d1d">Type check</text>
  <text x="310" y="704" class="label" text-anchor="middle" fill="#7f1d1d">Pass/fail</text>

  <!-- Tool 3: Profile -->
  <rect x="400" y="635" width="150" height="90" fill="#fee2e2" stroke="#f87171" stroke-width="1.5" rx="3"/>
  <text x="475" y="655" class="component" text-anchor="middle" fill="#991b1b">③ Profile</text>
  <text x="475" y="672" class="label" text-anchor="middle" fill="#7f1d1d">EDA report</text>
  <text x="475" y="688" class="label" text-anchor="middle" fill="#7f1d1d">ydata-prof</text>
  <text x="475" y="704" class="label" text-anchor="middle" fill="#7f1d1d">Generate HTML</text>

  <!-- Tool 4-5: Clean &amp; Engineer -->
  <rect x="565" y="635" width="150" height="90" fill="#fee2e2" stroke="#f87171" stroke-width="1.5" rx="3"/>
  <text x="640" y="655" class="component" text-anchor="middle" fill="#991b1b">④ ⑤ Clean</text>
  <text x="640" y="672" class="label" text-anchor="middle" fill="#7f1d1d">Type coerce</text>
  <text x="640" y="688" class="label" text-anchor="middle" fill="#7f1d1d">Dedup, encode</text>
  <text x="640" y="704" class="label" text-anchor="middle" fill="#7f1d1d">Split train/test</text>

  <!-- Tool 6: Validate Features -->
  <rect x="730" y="635" width="150" height="90" fill="#fee2e2" stroke="#f87171" stroke-width="1.5" rx="3"/>
  <text x="805" y="655" class="component" text-anchor="middle" fill="#991b1b">⑥ Validate</text>
  <text x="805" y="672" class="label" text-anchor="middle" fill="#7f1d1d">Feature schema</text>
  <text x="805" y="688" class="label" text-anchor="middle" fill="#7f1d1d">Pandera check</text>
  <text x="805" y="704" class="label" text-anchor="middle" fill="#7f1d1d">Matrix validate</text>

  <!-- Tool 7: Train -->
  <rect x="895" y="635" width="150" height="90" fill="#f3e8ff" stroke="#c084fc" stroke-width="1.5" rx="3"/>
  <text x="970" y="655" class="component" text-anchor="middle" fill="#6b21a8">⑦ Train</text>
  <text x="970" y="672" class="label" text-anchor="middle" fill="#6b21a8">Ridge + LGBM</text>
  <text x="970" y="688" class="label" text-anchor="middle" fill="#6b21a8">MLflow autolog</text>
  <text x="970" y="704" class="label" text-anchor="middle" fill="#6b21a8">Compute metrics</text>

  <!-- Tool 8-9: Register &amp; Drift -->
  <text x="70" y="770" class="label" fill="#6b21a8" font-weight="600">⑧ Register to MLflow (Staging stage) • ⑨ Drift Report (Evidently AI)</text>
  <rect x="70" y="785" width="1030" height="60" fill="#f3e8ff" stroke="#c084fc" stroke-width="1.5" rx="3"/>
  <text x="90" y="805" class="label" fill="#6b21a8">Register both models (Ridge, LGBM) to MLflow Model Registry in Staging</text>
  <text x="90" y="825" class="label" fill="#6b21a8">Compare current feature distribution vs. previous run for drift detection; generate Evidently HTML report</text>

  <!-- OUTPUT LAYER -->
  <text x="50" y="900" class="subtitle" font-weight="bold" fill="#1f2937">OUTPUT &amp; SIDE EFFECTS</text>
  <line x1="50" y1="910" x2="1100" y2="910" stroke="#d1d5db" stroke-width="1"/>
  <text x="70" y="935" class="label" fill="#6b7280">✓ Data versioned (data/landing → raw → interim → features)</text>
  <text x="520" y="935" class="label" fill="#6b7280">✓ Models registered to MLflow Staging (manual promotion to Production)</text>

</svg>