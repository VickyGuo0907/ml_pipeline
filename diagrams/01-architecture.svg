<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 650">
  <defs><style>text{font-family:sans-serif}</style></defs>
  <rect width="1000" height="650" fill="white"/>
  <text x="500" y="30" font-size="24" font-weight="bold" text-anchor="middle" fill="#000">ML Pipeline Architecture</text>
  <!-- Services -->
  <rect x="30" y="70" width="140" height="100" fill="#3b82f6" rx="4"/>
  <text x="100" y="105" text-anchor="middle" fill="white" font-weight="bold">Airflow</text>
  <text x="100" y="125" text-anchor="middle" fill="white" font-size="12">Webserver:8080</text>
  <rect x="200" y="70" width="140" height="100" fill="#3b82f6" rx="4"/>
  <text x="270" y="105" text-anchor="middle" fill="white" font-weight="bold">MLflow</text>
  <text x="270" y="125" text-anchor="middle" fill="white" font-size="12">Server:5001</text>
  <rect x="370" y="70" width="140" height="100" fill="#06b6d4" rx="4"/>
  <text x="440" y="105" text-anchor="middle" fill="white" font-weight="bold">FastAPI</text>
  <text x="440" y="125" text-anchor="middle" fill="white" font-size="12">Server:8000</text>
  <!-- Databases -->
  <rect x="30" y="210" width="140" height="100" fill="#f87171" rx="4"/>
  <text x="100" y="245" text-anchor="middle" fill="white" font-weight="bold">Airflow DB</text>
  <text x="100" y="265" text-anchor="middle" fill="white" font-size="12">Postgres:5432</text>
  <rect x="200" y="210" width="140" height="100" fill="#f87171" rx="4"/>
  <text x="270" y="245" text-anchor="middle" fill="white" font-weight="bold">MLflow DB</text>
  <text x="270" y="265" text-anchor="middle" fill="white" font-size="12">Postgres:5433</text>
  <!-- Data/Storage -->
  <rect x="550" y="70" width="180" height="240" fill="#ecfdf5" stroke="#10b981" stroke-width="2" rx="4"/>
  <text x="640" y="95" font-weight="bold" text-anchor="middle" fill="#059669">Data Volumes</text>
  <text x="640" y="125" font-size="11" text-anchor="middle" fill="#6b7280">data/landing</text>
  <text x="640" y="150" font-size="11" text-anchor="middle" fill="#6b7280">data/raw/{run_id}</text>
  <text x="640" y="175" font-size="11" text-anchor="middle" fill="#6b7280">data/interim</text>
  <text x="640" y="200" font-size="11" text-anchor="middle" fill="#6b7280">data/features</text>
  <text x="640" y="225" font-size="11" text-anchor="middle" fill="#6b7280">mlflow-artifacts</text>
  <text x="640" y="250" font-size="11" text-anchor="middle" fill="#6b7280">reports</text>
  <!-- Connections -->
  <line x1="100" y1="170" x2="100" y2="210" stroke="#2563eb" stroke-width="2"/>
  <line x1="270" y1="170" x2="270" y2="210" stroke="#2563eb" stroke-width="2"/>
  <line x1="440" y1="170" x2="270" y2="120" stroke="#2563eb" stroke-width="2"/>
  <line x1="370" y1="120" x2="550" y2="150" stroke="#2563eb" stroke-width="2"/>
  <!-- Pipeline description -->
  <rect x="30" y="380" width="700" height="230" fill="#f0f9ff" stroke="#0284c7" stroke-width="2" rx="4"/>
  <text x="50" y="405" font-weight="bold" fill="#0c4a6e">9-Stage Pipeline (Sequential DAG)</text>
  <text x="50" y="430" font-size="12" fill="#374151">① ingest ▶ ② validate_raw ▶ ③ profile ▶ ④ clean</text>
  <text x="50" y="450" font-size="12" fill="#374151">⑤ engineer_features ▶ ⑥ validate_features ▶ ⑦ train</text>
  <text x="50" y="470" font-size="12" fill="#374151">⑧ register (MLflow Staging) ▶ ⑨ drift_report</text>
  <text x="50" y="500" font-size="11" fill="#6b7280">Data flow: landing ▶ raw ▶ interim ▶ features ▶ models</text>
  <text x="50" y="520" font-size="11" fill="#6b7280">Versioning: manifest.yaml at each boundary with SHA256 hashes</text>
  <text x="50" y="540" font-size="11" fill="#6b7280">Models: Ridge + LightGBM registered to MLflow Staging</text>
  <text x="50" y="560" font-size="11" fill="#6b7280">Serving: FastAPI loads Production model on startup</text>
  <text x="50" y="580" font-size="11" fill="#6b7280">Monitoring: Evidently drift detection on each run</text>
</svg>