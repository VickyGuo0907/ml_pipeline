<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900">
  <defs>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
      .title { font-size: 24px; font-weight: bold; fill: #1f2937; }
      .subtitle { font-size: 13px; fill: #6b7280; }
      .stage-label { font-size: 12px; font-weight: 600; fill: #ffffff; text-anchor: middle; }
      .data-label { font-size: 10px; fill: #374151; font-weight: 500; }
    </style>
    <marker id="arrow2563eb" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow10b981" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10b981"/>
    </marker>
    <marker id="arrow7c3aed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/>
    </marker>
  </defs>
  <!-- Background -->
  <rect width="1400" height="900" fill="#ffffff"/>
  <!-- Title -->
  <text x="700" y="35" class="title" text-anchor="middle">ML Pipeline Data Flow</text>
  <text x="700" y="55" class="subtitle" text-anchor="middle">9-Stage Sequential Processing with Data Transformations</text>

  <!-- Stage 1: Ingest -->
  <rect x="30" y="90" width="110" height="60" fill="#2563eb" stroke="#1e40af" stroke-width="2" rx="4"/>
  <text x="85" y="115" class="stage-label" font-size="11">①</text>
  <text x="85" y="130" class="stage-label" font-size="11">Ingest</text>
  <text x="85" y="150" class="subtitle" text-anchor="middle" font-size="9">CSV→Parquet</text>

  <!-- Arrow 1→2 -->
  <line x1="140" y1="120" x2="165" y2="120" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow2563eb)"/>
  <rect x="145" y="110" width="45" height="16" fill="#ffffff" opacity="0.95" rx="2"/>
  <text x="167.5" y="122" class="data-label" text-anchor="middle" font-size="9">raw files</text>

  <!-- Stage 2: Validate Raw -->
  <rect x="165" y="90" width="110" height="60" fill="#2563eb" stroke="#1e40af" stroke-width="2" rx="4"/>
  <text x="220" y="115" class="stage-label" font-size="11">②</text>
  <text x="220" y="130" class="stage-label" font-size="10">Validate</text>
  <text x="220" y="145" class="stage-label" font-size="10">Raw</text>
  <text x="220" y="150" class="subtitle" text-anchor="middle" font-size="9">Pandera</text>

  <!-- Arrow 2→3 -->
  <line x1="275" y1="120" x2="300" y2="120" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow2563eb)"/>
  <rect x="280" y="110" width="25" height="16" fill="#ffffff" opacity="0.95" rx="2"/>
  <text x="292.5" y="122" class="data-label" text-anchor="middle" font-size="9">✓</text>

  <!-- Stage 3: Profile -->
  <rect x="300" y="90" width="110" height="60" fill="#2563eb" stroke="#1e40af" stroke-width="2" rx="4"/>
  <text x="355" y="115" class="stage-label" font-size="11">③</text>
  <text x="355" y="130" class="stage-label" font-size="11">Profile</text>
  <text x="355" y="150" class="subtitle" text-anchor="middle" font-size="9">ydata-prof</text>

  <!-- Arrow 3→4 -->
  <line x1="410" y1="120" x2="435" y2="120" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow2563eb)"/>
  <rect x="415" y="110" width="35" height="16" fill="#ffffff" opacity="0.95" rx="2"/>
  <text x="432.5" y="122" class="data-label" text-anchor="middle" font-size="9">HTML</text>

  <!-- Stage 4: Clean -->
  <rect x="435" y="90" width="110" height="60" fill="#2563eb" stroke="#1e40af" stroke-width="2" rx="4"/>
  <text x="490" y="115" class="stage-label" font-size="11">④</text>
  <text x="490" y="130" class="stage-label" font-size="11">Clean</text>
  <text x="490" y="150" class="subtitle" text-anchor="middle" font-size="9">Coerce, dedup</text>

  <!-- Arrow 4→5 -->
  <line x1="545" y1="120" x2="570" y2="120" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow2563eb)"/>
  <rect x="550" y="110" width="25" height="16" fill="#ffffff" opacity="0.95" rx="2"/>
  <text x="562.5" y="122" class="data-label" text-anchor="middle" font-size="9">clean</text>

  <!-- Stage 5: Engineer Features -->
  <rect x="570" y="90" width="110" height="60" fill="#2563eb" stroke="#1e40af" stroke-width="2" rx="4"/>
  <text x="625" y="110" class="stage-label" font-size="10">⑤</text>
  <text x="625" y="127" class="stage-label" font-size="10">Engineer</text>
  <text x="625" y="142" class="stage-label" font-size="10">Features</text>
  <text x="625" y="150" class="subtitle" text-anchor="middle" font-size="9">Encode, scale</text>

  <!-- Arrow 5→6 -->
  <line x1="680" y1="120" x2="705" y2="120" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow2563eb)"/>
  <rect x="685" y="110" width="35" height="16" fill="#ffffff" opacity="0.95" rx="2"/>
  <text x="702.5" y="122" class="data-label" text-anchor="middle" font-size="9">matrix</text>

  <!-- Stage 6: Validate Features -->
  <rect x="705" y="90" width="110" height="60" fill="#2563eb" stroke="#1e40af" stroke-width="2" rx="4"/>
  <text x="760" y="110" class="stage-label" font-size="10">⑥</text>
  <text x="760" y="127" class="stage-label" font-size="9">Validate</text>
  <text x="760" y="142" class="stage-label" font-size="9">Features</text>
  <text x="760" y="150" class="subtitle" text-anchor="middle" font-size="9">Pandera</text>

  <!-- Arrow 6→7 -->
  <line x1="815" y1="120" x2="840" y2="120" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow2563eb)"/>
  <rect x="820" y="110" width="25" height="16" fill="#ffffff" opacity="0.95" rx="2"/>
  <text x="832.5" y="122" class="data-label" text-anchor="middle" font-size="9">✓</text>

  <!-- Stage 7: Train Models -->
  <rect x="840" y="90" width="110" height="60" fill="#7c3aed" stroke="#6d28d9" stroke-width="2" rx="4"/>
  <text x="895" y="110" class="stage-label" font-size="10">⑦</text>
  <text x="895" y="127" class="stage-label" font-size="10">Train</text>
  <text x="895" y="142" class="stage-label" font-size="10">Models</text>
  <text x="895" y="150" class="subtitle" text-anchor="middle" font-size="9">Ridge, LGBM</text>

  <!-- Arrow 7→8 -->
  <line x1="950" y1="120" x2="975" y2="120" stroke="#7c3aed" stroke-width="2.5" marker-end="url(#arrow7c3aed)"/>
  <rect x="955" y="110" width="35" height="16" fill="#ffffff" opacity="0.95" rx="2"/>
  <text x="972.5" y="122" class="data-label" text-anchor="middle" font-size="9">runs</text>

  <!-- Stage 8: Register -->
  <rect x="975" y="90" width="110" height="60" fill="#8b5cf6" stroke="#6d28d9" stroke-width="2" rx="4"/>
  <text x="1030" y="110" class="stage-label" font-size="10">⑧</text>
  <text x="1030" y="127" class="stage-label" font-size="9">Register</text>
  <text x="1030" y="142" class="stage-label" font-size="9">to MLflow</text>
  <text x="1030" y="150" class="subtitle" text-anchor="middle" font-size="9">Staging</text>

  <!-- Arrow 8→9 -->
  <line x1="1085" y1="120" x2="1110" y2="120" stroke="#8b5cf6" stroke-width="2.5" marker-end="url(#arrow7c3aed)"/>
  <rect x="1090" y="110" width="35" height="16" fill="#ffffff" opacity="0.95" rx="2"/>
  <text x="1107.5" y="122" class="data-label" text-anchor="middle" font-size="9">models</text>

  <!-- Stage 9: Drift Report -->
  <rect x="1110" y="90" width="110" height="60" fill="#8b5cf6" stroke="#6d28d9" stroke-width="2" rx="4"/>
  <text x="1165" y="110" class="stage-label" font-size="10">⑨</text>
  <text x="1165" y="127" class="stage-label" font-size="9">Drift</text>
  <text x="1165" y="142" class="stage-label" font-size="9">Report</text>
  <text x="1165" y="150" class="subtitle" text-anchor="middle" font-size="9">Evidently</text>

  <!-- Output paths from stages -->
  <!-- Stage 1 outputs to raw -->
  <line x1="85" y1="150" x2="85" y2="200" stroke="#10b981" stroke-width="2" marker-end="url(#arrow10b981)"/>
  <rect x="50" y="210" width="70" height="35" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5" rx="3"/>
  <text x="85" y="225" class="data-label" text-anchor="middle" font-size="10" fill="#059669">data/raw/</text>
  <text x="85" y="238" class="data-label" text-anchor="middle" font-size="9" fill="#059669">{run_id}</text>

  <!-- Stage 3 outputs to reports -->
  <line x1="355" y1="150" x2="355" y2="200" stroke="#10b981" stroke-width="2" marker-end="url(#arrow10b981)"/>
  <rect x="315" y="210" width="80" height="35" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5" rx="3"/>
  <text x="355" y="225" class="data-label" text-anchor="middle" font-size="10" fill="#b45309">reports/</text>
  <text x="355" y="238" class="data-label" text-anchor="middle" font-size="9" fill="#b45309">profile_*.html</text>

  <!-- Stage 4 outputs to interim -->
  <line x1="490" y1="150" x2="490" y2="200" stroke="#10b981" stroke-width="2" marker-end="url(#arrow10b981)"/>
  <rect x="445" y="210" width="90" height="35" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5" rx="3"/>
  <text x="490" y="225" class="data-label" text-anchor="middle" font-size="10" fill="#059669">data/interim/</text>
  <text x="490" y="238" class="data-label" text-anchor="middle" font-size="9" fill="#059669">{run_id}</text>

  <!-- Stage 5 outputs to features -->
  <line x1="625" y1="150" x2="625" y2="200" stroke="#10b981" stroke-width="2" marker-end="url(#arrow10b981)"/>
  <rect x="575" y="210" width="100" height="35" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5" rx="3"/>
  <text x="625" y="225" class="data-label" text-anchor="middle" font-size="10" fill="#059669">data/features/</text>
  <text x="625" y="238" class="data-label" text-anchor="middle" font-size="9" fill="#059669">train.parquet</text>

  <!-- Stage 7-8 outputs to MLflow artifacts -->
  <line x1="1030" y1="150" x2="1030" y2="200" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrow7c3aed)"/>
  <rect x="975" y="210" width="110" height="35" fill="#f3e8ff" stroke="#7c3aed" stroke-width="1.5" rx="3"/>
  <text x="1030" y="225" class="data-label" text-anchor="middle" font-size="10" fill="#6d28d9">mlflow-</text>
  <text x="1030" y="238" class="data-label" text-anchor="middle" font-size="9" fill="#6d28d9">artifacts/{model}</text>

  <!-- Stage 9 outputs to reports -->
  <line x1="1165" y1="150" x2="1165" y2="200" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrow7c3aed)"/>
  <rect x="1125" y="210" width="80" height="35" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5" rx="3"/>
  <text x="1165" y="225" class="data-label" text-anchor="middle" font-size="10" fill="#b45309">reports/</text>
  <text x="1165" y="238" class="data-label" text-anchor="middle" font-size="9" fill="#b45309">drift_*.html</text>

  <!-- Key Data Transformations Section -->
  <text x="50" y="330" class="subtitle" font-size="12" font-weight="bold" fill="#1f2937">Key Data Transformations</text>

  <rect x="50" y="350" width="1280" height="500" fill="none" stroke="#e5e7eb" stroke-width="1" rx="4"/>

  <!-- Transformation details -->
  <text x="70" y="375" class="subtitle" font-size="11" font-weight="600" fill="#374151">① INGEST</text>
  <text x="70" y="395" class="data-label" font-size="10" fill="#6b7280">• Read CSV files from data/landing/</text>
  <text x="70" y="410" class="data-label" font-size="10" fill="#6b7280">• Compute SHA256 checksums</text>
  <text x="70" y="425" class="data-label" font-size="10" fill="#6b7280">• Create manifest.yaml with file metadata</text>
  <text x="70" y="440" class="data-label" font-size="10" fill="#6b7280">• Output: data/raw/{run_id}/ directory</text>

  <text x="390" y="375" class="subtitle" font-size="11" font-weight="600" fill="#374151">② - ③ VALIDATE &amp; PROFILE</text>
  <text x="390" y="395" class="data-label" font-size="10" fill="#6b7280">• Pandera schema validation</text>
  <text x="390" y="410" class="data-label" font-size="10" fill="#6b7280">• Type checking, nullability, bounds</text>
  <text x="390" y="425" class="data-label" font-size="10" fill="#6b7280">• Generate ydata-profiling HTML EDA</text>
  <text x="390" y="440" class="data-label" font-size="10" fill="#6b7280">• Output: reports/profile_*.html</text>

  <text x="770" y="375" class="subtitle" font-size="11" font-weight="600" fill="#374151">④ CLEAN</text>
  <text x="770" y="395" class="data-label" font-size="10" fill="#6b7280">• Type coercion (e.g., int, float, str)</text>
  <text x="770" y="410" class="data-label" font-size="10" fill="#6b7280">• Drop columns with >50% missing</text>
  <text x="770" y="425" class="data-label" font-size="10" fill="#6b7280">• Remove duplicate rows</text>
  <text x="770" y="440" class="data-label" font-size="10" fill="#6b7280">• Output: data/interim/{run_id}/</text>

  <text x="70" y="490" class="subtitle" font-size="11" font-weight="600" fill="#374151">⑤ FEATURE ENGINEERING</text>
  <text x="70" y="510" class="data-label" font-size="10" fill="#6b7280">• Label encoding on categorical columns</text>
  <text x="70" y="525" class="data-label" font-size="10" fill="#6b7280">• One-hot encoding on comparison features</text>
  <text x="70" y="540" class="data-label" font-size="10" fill="#6b7280">• StandardScaler on numeric features</text>
  <text x="70" y="555" class="data-label" font-size="10" fill="#6b7280">• 80/20 train/test split</text>
  <text x="70" y="570" class="data-label" font-size="10" fill="#6b7280">• Output: data/features/{run_id}/{train,test}.parquet</text>

  <text x="470" y="490" class="subtitle" font-size="11" font-weight="600" fill="#374151">⑦ TRAIN MODELS</text>
  <text x="470" y="510" class="data-label" font-size="10" fill="#6b7280">• Ridge regression (linear baseline)</text>
  <text x="470" y="525" class="data-label" font-size="10" fill="#6b7280">• LightGBM gradient boosting</text>
  <text x="470" y="540" class="data-label" font-size="10" fill="#6b7280">• Compute MSE, RMSE on test set</text>
  <text x="470" y="555" class="data-label" font-size="10" fill="#6b7280">• MLflow autolog metrics &amp; artifacts</text>
  <text x="470" y="570" class="data-label" font-size="10" fill="#6b7280">• Output: MLflow experiment runs</text>

  <text x="870" y="490" class="subtitle" font-size="11" font-weight="600" fill="#374151">⑧ - ⑨ REGISTER &amp; DRIFT</text>
  <text x="870" y="510" class="data-label" font-size="10" fill="#6b7280">• Register both models to MLflow Staging</text>
  <text x="870" y="525" class="data-label" font-size="10" fill="#6b7280">• Manual click to promote to Production</text>
  <text x="870" y="540" class="data-label" font-size="10" fill="#6b7280">• Compare current features vs. previous</text>
  <text x="870" y="555" class="data-label" font-size="10" fill="#6b7280">• Evidently drift detection &amp; reports</text>
  <text x="870" y="570" class="data-label" font-size="10" fill="#6b7280">• Output: reports/drift_*.html</text>

</svg>