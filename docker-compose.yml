version: '3.8'

services:
  # PostgreSQL for Airflow metadata
  airflow-postgres:
    image: postgres:16-alpine
    container_name: airflow-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: ${AIRFLOW_DB_PASSWORD:-airflow}
      POSTGRES_DB: airflow
    ports:
      - "5432:5432"
    volumes:
      - airflow-postgres-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ml-pipeline

  # PostgreSQL for MLflow tracking
  mlflow-postgres:
    image: postgres:16-alpine
    container_name: mlflow-postgres
    environment:
      POSTGRES_USER: mlflow
      POSTGRES_PASSWORD: ${MLFLOW_DB_PASSWORD:-mlflow}
      POSTGRES_DB: mlflow
    ports:
      - "5433:5432"
    volumes:
      - mlflow-postgres-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlflow -d mlflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ml-pipeline

  # Airflow Webserver
  airflow-webserver:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: airflow-webserver
    depends_on:
      airflow-postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__UNIT_TEST_MODE: "False"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql://airflow:${AIRFLOW_DB_PASSWORD:-airflow}@airflow-postgres:5432/airflow
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "True"
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY:-change-me-in-production}
      AIRFLOW__LOGGING__BASE_LOG_FOLDER: /opt/airflow/logs
    ports:
      - "8080:8080"
    volumes:
      - ${PWD}/src/dags:/opt/airflow/dags
      - ${PWD}/src:/opt/airflow/src
      - ${PWD}/config:/opt/airflow/config
      - ${PWD}/data:/opt/airflow/data
      - ${PWD}/mlflow-artifacts:/opt/airflow/mlflow-artifacts
      - ${PWD}/reports:/opt/airflow/reports
      - airflow-logs:/opt/airflow/logs
    entrypoint: >
      bash -c "airflow db migrate && airflow webserver"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ml-pipeline

  # Airflow Scheduler
  airflow-scheduler:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: airflow-scheduler
    depends_on:
      airflow-postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__UNIT_TEST_MODE: "False"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql://airflow:${AIRFLOW_DB_PASSWORD:-airflow}@airflow-postgres:5432/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY:-change-me-in-production}
      AIRFLOW__LOGGING__BASE_LOG_FOLDER: /opt/airflow/logs
    volumes:
      - ${PWD}/src/dags:/opt/airflow/dags
      - ${PWD}/src:/opt/airflow/src
      - ${PWD}/config:/opt/airflow/config
      - ${PWD}/data:/opt/airflow/data
      - ${PWD}/mlflow-artifacts:/opt/airflow/mlflow-artifacts
      - ${PWD}/mlflow-artifacts:/mlflow-artifacts
      - ${PWD}/reports:/opt/airflow/reports
      - airflow-logs:/opt/airflow/logs
    command: scheduler
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname $$(hostname) || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - ml-pipeline

  # Airflow Triggerer
  airflow-triggerer:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: airflow-triggerer
    depends_on:
      airflow-postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__UNIT_TEST_MODE: "False"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql://airflow:${AIRFLOW_DB_PASSWORD:-airflow}@airflow-postgres:5432/airflow
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY:-change-me-in-production}
      AIRFLOW__LOGGING__BASE_LOG_FOLDER: /opt/airflow/logs
    volumes:
      - ${PWD}/src/dags:/opt/airflow/dags
      - ${PWD}/src:/opt/airflow/src
      - ${PWD}/config:/opt/airflow/config
      - ${PWD}/data:/opt/airflow/data
      - ${PWD}/mlflow-artifacts:/opt/airflow/mlflow-artifacts
      - ${PWD}/reports:/opt/airflow/reports
      - airflow-logs:/opt/airflow/logs
    command: triggerer
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type TriggererJob --hostname $$(hostname) || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - ml-pipeline

  # MLflow Server
  mlflow-server:
    build:
      context: .
      dockerfile: Dockerfile.mlflow
    container_name: mlflow-server
    depends_on:
      mlflow-postgres:
        condition: service_healthy
    environment:
      BACKEND_STORE_URI: postgresql://mlflow:${MLFLOW_DB_PASSWORD:-mlflow}@mlflow-postgres:5432/mlflow
    ports:
      - "5001:5000"
    volumes:
      - ${PWD}/mlflow-artifacts:/mlflow-artifacts
    command: >
      mlflow server
      --backend-store-uri postgresql://mlflow:${MLFLOW_DB_PASSWORD:-mlflow}@mlflow-postgres:5432/mlflow
      --default-artifact-root /mlflow-artifacts
      --serve-artifacts
      --host 0.0.0.0
      --port 5000
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ml-pipeline

  # Reports server — serves HTML profiling reports at http://localhost:8888
  reports-server:
    image: nginx:alpine
    container_name: reports-server
    ports:
      - "8888:80"
    volumes:
      - ${PWD}/reports:/usr/share/nginx/html:ro
      - ${PWD}/config/nginx/reports.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - ml-pipeline

  # FastAPI Serving
  fastapi:
    image: python:3.11-slim
    container_name: fastapi-server
    depends_on:
      mlflow-server:
        condition: service_healthy
    environment:
      MLFLOW_TRACKING_URI: http://mlflow-server:5000
    ports:
      - "8000:8000"
    volumes:
      - ${PWD}/src:/app/src
      - ${PWD}/config:/app/config
      - ${PWD}/mlflow-artifacts:/app/mlflow-artifacts:ro
    working_dir: /app
    command: >
      bash -c "pip install -q uvicorn fastapi requests pydantic mlflow pandas scikit-learn lightgbm &&
      python -m uvicorn src.serve:app --host 0.0.0.0 --port 8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ml-pipeline

volumes:
  airflow-postgres-db:
  mlflow-postgres-db:
  airflow-logs:

networks:
  ml-pipeline:
    driver: bridge
